name: Mise à jour des données
 
on:
  schedule:
    - cron: "0 18 * * 1-5"   # 18:00 UTC du lundi au vendredi (après clôture EU)
  workflow_dispatch:          # bouton "Run workflow" pour lancer à la main
 
permissions:
  contents: write
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Installer les dépendances
        run: pip install -r requirements.txt
 
      - name: Générer data.json
        run: python update.py
 
      - name: Committer si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "maj données $(date -u +%F)" || echo "rien à committer"
          git push
 
